{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FlashCards{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/site.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>

<header class="site-header">
    <div class="nav-inner">
        <a href="{% if user.is_authenticated %}{% url 'dashboard' %}{% else %}{% url 'login' %}{% endif %}" class="nav-logo">Flash<span>Cards</span></a>

        {% if user.is_authenticated %}
        <nav class="nav-links">
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'deck_list' %}">Decks</a>
            <a href="{% url 'deck_create' %}">New deck</a>
            <a href="{% url 'study_today' %}">Study</a>
        </nav>
        <div class="nav-right">
            <span class="nav-user">{{ user.username }}</span>
            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="btn-logout">Log out</button>
            </form>
        </div>
        {% else %}
        <div class="nav-right" style="margin-left:auto;">
            <a href="{% url 'login' %}" class="btn btn-ghost">Log in</a>
            <a href="{% url 'signup' %}" class="btn btn-primary">Sign up</a>
        </div>
        {% endif %}
    </div>
</header>

<main class="page-wrapper">
    {% block content %}{% endblock %}
</main>

</body>
</html>
