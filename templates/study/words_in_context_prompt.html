{% extends "base.html" %}

{% block title %}AI prompt — Words in context{% endblock %}

{% block content %}
<div class="page-header fade-in">
    <h1>AI prompt</h1>
    <p class="subtitle">
        Copy this prompt to ChatGPT. Then paste the JSON response below.
    </p>
</div>

<div class="card fade-in-2" style="margin-bottom:20px;">
    <div class="form-group">
        <label for="id_ai_prompt">Prompt for ChatGPT</label>
        <textarea id="id_ai_prompt" rows="18" readonly>{{ ai_prompt }}</textarea>
    </div>

    <button type="button" id="copy-ai-context-prompt-btn" class="btn btn-secondary">
        Copy prompt
    </button>

    <p id="copy-ai-context-prompt-status" class="subtitle" style="margin-top:10px;"></p>
</div>

<div class="card fade-in-3">
    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label for="id_ai_response">Paste ChatGPT JSON response here</label>
            <textarea
                id="id_ai_response"
                name="ai_response"
                rows="14"
                placeholder="Paste JSON response from ChatGPT here"
            >{{ ai_response }}</textarea>
        </div>

        <div class="practice-done-actions">
            <button type="submit" class="btn btn-primary">
                Start practice
            </button>
            <a href="{% url 'words_in_context_setup' %}" class="btn btn-ghost">
                Choose again
            </a>
        </div>
    </form>
</div>

<script>
(function () {
    const copyBtn = document.getElementById("copy-ai-context-prompt-btn");
    const promptField = document.getElementById("id_ai_prompt");
    const status = document.getElementById("copy-ai-context-prompt-status");

    function copyTextToClipboard(text) {
        if (navigator.clipboard && window.isSecureContext) {
            return navigator.clipboard.writeText(text);
        }

        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        textarea.style.top = "-9999px";

        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();

        try {
            document.execCommand("copy");
            return Promise.resolve();
        } catch (error) {
            return Promise.reject(error);
        } finally {
            document.body.removeChild(textarea);
        }
    }

    if (!copyBtn || !promptField) {
        return;
    }

    copyBtn.addEventListener("click", function () {
        copyTextToClipboard(promptField.value || "")
            .then(function () {
                if (status) {
                    status.textContent = "Prompt copied.";
                }
            })
            .catch(function () {
                if (status) {
                    status.textContent = "Could not copy automatically.";
                }
            });
    });
})();
</script>
{% endblock %}
