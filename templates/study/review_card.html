{% extends "base.html" %}
{% block title %}Review — FlashCards{% endblock %}

{% block content %}
<div style="max-width:680px;margin:0 auto;" class="fade-in">

    <div class="review-meta">
        <p style="font-size:.8rem;color:var(--text-3);">{{ card.deck.title }}</p>
        <div style="display:flex;align-items:center;gap:12px;">
            <span style="font-size:.8rem;color:var(--text-3);">{{ remaining_count }} remaining</span>
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill" style="width:40%;"></div>
            </div>
        </div>
    </div>

    <div class="flashcard-wrap">
        <div class="flashcard" id="flashcard">
            <div class="flashcard-face front">
                <div class="face-label">Question</div>
                <div class="card-text">{{ card.question|linebreaksbr }}</div>
            </div>
            <div class="flashcard-face back">
                <div class="face-label answer-label">Answer</div>
                <div class="card-text">{{ card.answer|linebreaksbr }}</div>
            </div>
        </div>
    </div>

    <div id="show-answer-container" class="show-btn-wrap">
        <button type="button" id="show-answer-btn" class="btn btn-primary" style="padding:12px 32px;">
            Reveal answer
        </button>
        <p class="hint-text">or press <kbd class="kbd">Space</kbd></p>
    </div>

    <form method="post" id="rating-form" style="display:none;">
        {% csrf_token %}
        <div class="rating-grid">
            <button type="submit" name="rating" value="1" class="rating-btn rating-again">
                Again <span class="hint">Forgot</span>
            </button>
            <button type="submit" name="rating" value="2" class="rating-btn rating-hard">
                Hard <span class="hint">Struggled</span>
            </button>
            <button type="submit" name="rating" value="3" class="rating-btn rating-good">
                Good <span class="hint">Recalled</span>
            </button>
            <button type="submit" name="rating" value="4" class="rating-btn rating-easy">
                Easy <span class="hint">Perfect</span>
            </button>
        </div>
    </form>
</div>

<script>
(function () {
    const card = document.getElementById("flashcard");
    const showBtn = document.getElementById("show-answer-btn");
    const showWrap = document.getElementById("show-answer-container");
    const ratingForm = document.getElementById("rating-form");

    function reveal() {
        card.classList.add("flipped");
        showWrap.style.display = "none";
        setTimeout(() => {
            ratingForm.style.display = "block";
            ratingForm.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }, 280);
    }

    showBtn.addEventListener("click", reveal);
    document.addEventListener("keydown", function (e) {
        if ((e.code === "Space" || e.key === " ") && showWrap.style.display !== "none") {
            e.preventDefault();
            reveal();
        }
    });
})();
</script>
{% endblock %}
