{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<h1>Sign Up</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Create account</button>
</form>

<p>
    <a href="{% url 'login' %}">Already have an account?</a>
</p>
{% endblock %}
