server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    resolver 127.0.0.11 valid=10s;
    set $django_upstream http://web:8000;

    ssl_certificate /etc/nginx/origin-certs/cloudflare-origin.crt;
    ssl_certificate_key /etc/nginx/origin-certs/cloudflare-origin.key;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /favicon.ico {
        alias /app/staticfiles/favicon/favicon.ico;
        access_log off;
        log_not_found off;
    }

    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location ~ /\.(?!well-known) {
        return 404;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /accounts/login/ {
        limit_req zone=login_limit burst=10 nodelay;
        limit_conn addr_limit 10;

        proxy_pass $django_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
    }

    location /admin/ {
        limit_req zone=login_limit burst=10 nodelay;
        limit_conn addr_limit 10;

        proxy_pass $django_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
    }

    location / {
        limit_req zone=main_limit burst=20 nodelay;
        limit_conn addr_limit 20;

        proxy_pass $django_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
    }
}